model_list:
  # 通用匹配：所有模型请求都路由到 traj_proxy（localhost 通信）
  - model_name: "*"
    litellm_params:
      model: "openai/*"
      api_base: http://127.0.0.1:12300/v1
      api_key: "sk-1234"
  - model_name: "*"
    litellm_params:
      model: "openai/*"
      api_base: http://127.0.0.1:12301/v1
