# ProxyCore Worker配置
proxy_core_workers:
  count: 2                    # Worker数量
  base_port: 8000             # 起始端口（8000, 8001）
  models:
    - model_name: qwen3.5-2b
      url: http://host.docker.internal:1234
      api_key: sk-1234
      tokenizer_path: Qwen/Qwen2.5-7B
      token_in_token_out: false
    # 添加更多模型配置
    # - model_name: gpt-4
    #   url: http://openai-proxy:8080
    #   api_key: sk-abcd
    #   tokenizer_path: openai/gpt-4
    #   token_in_token_out: false

# TranscriptProvider Worker配置
transcript_provider_workers:
  count: 1                    # Worker数量
  base_port: 9000             # 起始端口（9000）

# Ray配置
ray:
  num_cpus: 4                 # CPU核心数
  working_dir: "/app/traj_proxy"  # 默认容器内路径，可通过环境变量 RAY_WORKING_DIR 覆盖
  pythonpath: "/app/traj_proxy"    # 默认容器内 PYTHONPATH，可通过环境变量 RAY_PYTHONPATH 覆盖

# 数据库配置
database:
  url: "postgresql://llmproxy:dbpassword9090@db:5432/litellm"
