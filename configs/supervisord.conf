[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info

# ========================================
# PostgreSQL 数据库
# ========================================
[program:postgresql]
command=/usr/lib/postgresql/16/bin/postgres -D %(ENV_PGDATA)s -c max_connections=300 -c unix_socket_directories=/run/postgresql
user=postgres
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/postgresql.log
stderr_logfile=/var/log/supervisor/postgresql_error.log
stopwaitsecs=30
stopasgroup=true
killasgroup=true

# ========================================
# LiteLLM 网关
# ========================================
[program:litellm]
command=/app/scripts/entrypoint_allinone.sh litellm
user=root
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/litellm.log
stderr_logfile=/var/log/supervisor/litellm_error.log
stopwaitsecs=10
stopasgroup=true
killasgroup=true
environment=PYTHONUNBUFFERED="1"

# ========================================
# TrajProxy 主应用
# ========================================
[program:traj_proxy]
command=/app/scripts/entrypoint_allinone.sh traj_proxy
user=root
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/traj_proxy.log
stderr_logfile=/var/log/supervisor/traj_proxy_error.log
stopwaitsecs=15
stopasgroup=true
killasgroup=true
environment=PYTHONUNBUFFERED="1",PYTHONPATH="/app"

# ========================================
# Nginx 反向代理
# ========================================
[program:nginx]
command=/usr/sbin/nginx -g 'daemon off;'
user=root
autostart=true
autorestart=true
priority=40
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx_error.log
stopwaitsecs=5
