server {
    listen 80;

    # 匹配 /s/{session_id}/... 格式的请求
    # 捕获 session_id 和剩余路径
    location ~ ^/s/([^/]+)/(.*)$ {
        # 代理到 litellm:4000，去掉 /s/{session_id} 部分
        proxy_pass http://litellm:4000/$2;

        # 设置 session_id 到 header
        proxy_set_header x-session-id $1;

        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 匹配非 /s/ 开头的请求，直接转发
    location / {
        proxy_pass http://litellm:4000;

        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
